<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Care Hospital | Professional Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-hospital-alt"></i> City<span>Care</span>
            </div>
            
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>

            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                
                <button id="login-btn" class="btn-primary">Login</button>
            </div>
        </nav>
    </header>

    <main id="home">
        <section class="hero">
            <h1>Expert Medical Care, <br>Just a Click Away.</h1>
            <p>Access your medical records and book appointments securely using your mobile number.</p>
        </section>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Patient Login</h2>
            <p>Please enter your Ethiopian phone number to continue.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="full-name">Full Name</label>
                    <div class="name-input-wrapper">
                        <input type="text" id="full-name" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="flag-icon">🇪🇹</span>
                        <span class="prefix">+251</span>
                        <input type="tel" id="phone" placeholder="911223344" maxlength="9" required>
                    </div>
                    <small id="error-msg">Please enter a valid 9-digit number</small>
                </div>
                
                <button type="submit" class="btn-submit">Send Verification Code</button>
            </form>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
